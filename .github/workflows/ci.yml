name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python deps
        run: |
          cd verifiers/python-symbols
          pip install -e ".[dev]"

      - name: Run Go tests (includes LLM honesty invariant — required gate)
        run: go test ./...

      - name: Run Python tests
        run: |
          cd verifiers/python-symbols
          python -m pytest

      - name: Validate JSON schemas
        run: go test ./protocol/...

  # ── Quality gate: catch rate >= 80%, false-positive rate < 10% (required) ──
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python verifier + pinned deps for reproducible corpus
        run: |
          pip install -e "verifiers/python-symbols[dev]"
          pip install "numpy>=1.26,<2" "pandas>=2.0"

      - name: Benchmark quality gates
        run: go test -tags benchmark ./benchmark/... -v -timeout 600s
