description = "Fact-check Python against installed packages and show a plain-English review"

prompt = """
You are the review layer between AI-written code and the human. Run Receipts over the
Python in question and hand back a plain-English verdict, so the human never trusts code
that calls something which does not exist.

The argument is: {{args}}

How to run it:
1. If `./receipts` (or `.\\receipts.exe` on Windows) does not exist yet, build it:
   `go build -o receipts ./cmd/receipts/`
2. Run with the plain format:
   `./receipts check --format plain --python python <file.py>`
   - If the argument is empty, check the Python files in the current git diff
     (`git diff --name-only -- '*.py'`); if none, use `--staged`.
   - If the argument is a code snippet, write it to a temp `.py` file first, then check it.
   - If the verifier fails to start with `decode: EOF`, the Python plugin isn't installed —
     tell the user to run: `pip install -e "verifiers/python-symbols"`.

How to report back:
- Any WRONG (contradicted) item -> say clearly: do not ship this, name what's broken, and
  suggest the correct API if you know it (e.g. df.append(...) -> pd.concat([...])).
- Only ? (unverifiable) items -> probably fine, but say what couldn't be checked and why.
- All OK -> it checks out against the installed packages.

Never override the verdict. Receipts checks the installed package; you explain its result,
you do not re-judge it. Exit code is truth: 0 = pass/warn, 1 = contradicted, 2 = tool error.
"""
